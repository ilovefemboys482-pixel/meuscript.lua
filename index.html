<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoJo Anons Hub</title>
    <style>
        :root {
            --primary-purple: #6a0dad;
            --gold: #ffd700;
            --dark-bg: #0b0f1a;
            --chat-bg: #161b22;
            --text-light: #f1f5f9;
            --anon-msg: #2d333b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- MENU --- */
        nav {
            background: #000;
            border-bottom: 3px solid var(--gold);
            display: flex;
            justify-content: center;
            padding: 15px;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav button {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav button.active { background: var(--gold); color: black; }

        /* --- TELAS --- */
        .screen { display: none; padding: 20px; flex-grow: 1; overflow-y: auto; }
        .active-screen { display: flex; flex-direction: column; }

        /* --- CHAT --- */
        #chat-window {
            flex-grow: 1;
            background: var(--chat-bg);
            border-radius: 8px;
            padding: 20px;
            margin: 10px auto;
            width: 95%;
            max-width: 700px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid #30363d;
        }

        .msg { padding: 12px; border-radius: 8px; max-width: 85%; }
        .other-msg { background: var(--anon-msg); align-self: flex-start; border-left: 4px solid var(--primary-purple); }
        .my-msg { background: #0369a1; align-self: flex-end; border-right: 4px solid var(--gold); }
        .anon-header { font-size: 0.75rem; font-weight: bold; color: var(--gold); display: block; margin-bottom: 5px; }

        .input-group { display: flex; gap: 10px; width: 95%; max-width: 700px; margin: 0 auto 20px; }
        input { flex: 1; padding: 15px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 5px; }

        /* --- GRID DE PERSONAGENS COM FOTOS --- */
        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .char-card {
            background: #1c2128;
            border: 2px solid #30363d;
            border-radius: 15px;
            overflow: hidden; /* Corta a imagem nas bordas arredondadas */
            text-align: center;
            transition: 0.3s;
        }

        .char-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .char-img {
            width: 100%;
            height: 350px;
            object-fit: cover; /* Ajusta a imagem sem distorcer */
            border-bottom: 2px solid var(--gold);
        }

        .char-info { padding: 15px; }
        .char-info h3 { margin: 0; color: var(--gold); font-size: 1.5rem; }
        .char-info p { margin: 5px 0; color: #ccc; }

    </style>
</head>
<body>

    <nav>
        <button id="btn-chat" class="active" onclick="showScreen('chat')">Chat Público</button>
        <button id="btn-chars" onclick="showScreen('chars')">Personagens</button>
    </nav>

    <div id="screen-chat" class="screen active-screen">
        <div id="chat-window">
            <div class="msg other-msg"><span class="anon-header">Anon#4412</span>Alguém viu o Kira por aí?</div>
        </div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Diga algo...">
            <button onclick="sendMessage()" style="background:var(--gold); border:none; padding:0 20px; cursor:pointer; font-weight:bold;">ENVIAR</button>
        </div>
    </div>

    <div id="screen-chars" class="screen">
        <h2 style="text-align:center; color: var(--gold); font-size: 2rem; margin-bottom: 30px;">ARQUIVOS DA FUNDAÇÃO SPEEDWAGON</h2>
        
        <div class="char-grid">
            <div class="char-card">
                <img src="https://i.pinimg.com/originals/74/46/61/74466185806283b567d0284c17290d29.jpg" alt="Yoshikage Kira" class="char-img">
                <div class="char-info">
                    <h3>Yoshikage Kira</h3>
                    <p>Parte 4: Diamond is Unbreakable</p>
                    <p>Stand: <b>Killer Queen</b></p>
                </div>
            </div>

            <div class="char-card">
                <img src="https://images.tcdn.com.br/img/img_prod/1126131/poster_jojo_s_bizarre_adventure_stardust_crusaders_jotaro_kujo_a3_997_1_049445173e903d7e5b2069f9e9dfb652.jpg" alt="Jotaro Kujo" class="char-img">
                <div class="char-info">
                    <h3>Jotaro Kujo</h3>
                    <p>Parte 3: Stardust Crusaders</p>
                    <p>Stand: <b>Star Platinum</b></p>
                </div>
            </div>

            <div class="char-card">
                <img src="https://i.pinimg.com/736x/87/46/89/87468903932857413d71701199342777.jpg" alt="Giorno Giovanna" class="char-img">
                <div class="char-info">
                    <h3>Giorno Giovanna</h3>
                    <p>Parte 5: Vento Aureo</p>
                    <p>Stand: <b>Gold Experience</b></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showScreen(screenType) {
            document.getElementById('screen-chat').classList.toggle('active-screen', screenType === 'chat');
            document.getElementById('screen-chars').classList.toggle('active-screen', screenType === 'chars');
            document.getElementById('btn-chat').classList.toggle('active', screenType === 'chat');
            document.getElementById('btn-chars').classList.toggle('active', screenType === 'chars');
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            if(input.value.trim() === "") return;
            const win = document.getElementById('chat-window');
            const myMsg = document.createElement('div');
            myMsg.className = "msg my-msg";
            myMsg.innerHTML = `<span class="anon-header" style="color:#fff">Você</span>${input.value}`;
            win.appendChild(myMsg);
            input.value = "";
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
